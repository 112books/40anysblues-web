<div id="pwd-gate">
  <div class="pwd-box">
    <p class="pwd-title">40 Anys de Blues a Barcelona</p>
    <p class="pwd-sub">Accés restringit · En construcció</p>
    <form id="pwd-form">
      <input type="password" id="pwd-input" placeholder="Contrasenya" autocomplete="off">
      <button type="submit">Entrar</button>
      <p id="pwd-error" hidden>Contrasenya incorrecta</p>
    </form>
  </div>
</div>
<script>
(function(){
  var K = 'blues40_auth';
  var P = '{{ .Site.Params.site_password }}';
  var gate = document.getElementById('pwd-gate');
  if (localStorage.getItem(K) === P) {
    gate.style.display = 'none';
  } else {
    document.getElementById('pwd-form').addEventListener('submit', function(e){
      e.preventDefault();
      var val = document.getElementById('pwd-input').value;
      if (val === P) {
        localStorage.setItem(K, val);
        gate.style.display = 'none';
      } else {
        document.getElementById('pwd-error').hidden = false;
        document.getElementById('pwd-input').value = '';
      }
    });
  }
})();
</script>
